<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa del Proyecto</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Eliminar márgenes y hacer que el mapa llene toda la pantalla del iframe */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        /* Ajustes finos para los popups */
        .popup-contenido h3 { margin: 0 0 5px 0; color: #1b3d2f; font-size: 15px; font-family: sans-serif; }
        .popup-contenido p { margin: 0; color: #444; font-size: 12px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js"></script>

<script>
    const mapaCalles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' });
    const mapaSatélite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

    const map = L.map('map', { 
        center: [18.0, -97.1], 
        zoom: 9, 
        layers: [mapaCalles] 
    });

    // Marcadores de Localidades Específicas
    const locChazumba = L.marker([18.1886, -97.6764]).bindPopup('<div class="popup-contenido"><h3>Santiago Chazumba</h3><p>Región Mixteca Baja, matorral xerófilo y cactáceas.</p></div>');
    const locIxcatlan = L.marker([17.8481, -97.1811]).bindPopup('<div class="popup-contenido"><h3>Santa María Ixcatlán</h3><p>Tierra del pueblo Ixcateco y palma tejedora.</p></div>');
    const locTecomavaca = L.marker([18.1403, -97.0256]).bindPopup('<div class="popup-contenido"><h3>Santa María Tecomavaca</h3><p>Valle semiárido, cañones profundos y guacamayas.</p></div>');
    const locTomellin = L.marker([17.7561, -96.9322]).bindPopup('<div class="popup-contenido"><h3>Tomellín</h3><p><b>Comunidad Base.</b> Punto neurálgico de la cañada.</p></div>');
    const locPapalo = L.marker([17.8047, -96.8856]).bindPopup('<div class="popup-contenido"><h3>Santos Reyes Pápalo</h3><p>Zona serrana alta, bosques templados.</p></div>');
    const locApoala = L.marker([17.6492, -97.1350]).bindPopup('<div class="popup-contenido"><h3>Santiago Apoala</h3><p>Cañadas de agua, caídas fluviales y encinares.</p></div>');

    const capaLocalidades = L.layerGroup([locChazumba, locIxcatlan, locTecomavaca, locTomellin, locPapalo, locApoala]).addTo(map);

    // Ruta Animada
    const coordenadasRuta = [
        [18.1886, -97.6764], [17.8481, -97.1811], [18.1403, -97.0256],
        [17.7561, -96.9322], [17.8047, -96.8856], [17.6492, -97.1350]
    ];

    const rutaAnimada = L.polyline.antPath(coordenadasRuta, {
        delay: 800, dashArray: [10, 15], weight: 3.5, color: "#2980b9", pulseColor: "#ffffff", paused: false
    }).addTo(map);

    const capasBase = { "Mapa de Calles": mapaCalles, "Vista Satelital": mapaSatélite };
    const capasSuperpuestas = { "Pueblos del Proyecto": capaLocalidades, "Ruta de Exploración": rutaAnimada };

    L.control.layers(capasBase, capasSuperpuestas, { collapsed: false }).addTo(map);

    // Cargar el Polígono de la Reserva (Tu GeoJSON)
    const estiloReserva = { color: "#d35400", weight: 2.5, opacity: 0.5, fillColor: "#e67e22", fillOpacity: 0.12 };

    fetch('tehuacancuicatlan.geojson')
        .then(response => response.json())
        .then(data => {
            const capaReserva = L.geoJSON(data, { style: estiloReserva }).addTo(map);
            map.fitBounds(capaReserva.getBounds());
        })
        .catch(error => console.error("Error cargando el GeoJSON:", error));
</script>

</body>
</html>
